# --------------------------------------------------------------------------
# Dokploy / Docker Compose deployment for the MarkItDown web front-end.
#
# In Dokploy: create a "Compose" service pointing at this repo, then add your
# domain under "Domains" with container port 8000. Traefik routes to the
# container over the shared "dokploy-network" (declared as external below) —
# without that network you get a 502 Bad Gateway.
#
# Locally:  docker compose up --build   ->   http://localhost:8000
# (Local runs ignore the external network if it doesn't exist; create it with
#  `docker network create dokploy-network` or remove the networks block.)
# --------------------------------------------------------------------------
services:
  markitdown-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: markitdown-web:latest
    restart: unless-stopped
    environment:
      PORT: 8000
      # Max upload size in MB.
      MARKITDOWN_MAX_UPLOAD_MB: 50
      # --- LLM-vision OCR (optional) ---------------------------------------
      # Set LLM_API_KEY to enable OCR of images inside PDF/DOCX/PPTX/XLSX and
      # full-page OCR of scanned PDFs. Works with any OpenAI-compatible API.
      # Leave LLM_API_KEY empty to keep everything 100% local (no OCR).
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"        # e.g. https://openrouter.ai/api/v1
      LLM_MODEL: "${LLM_MODEL:-gpt-4o}"        # e.g. openai/gpt-4o, gpt-4o-mini
      LLM_PROMPT: "${LLM_PROMPT:-}"            # optional custom extraction prompt
      # --- Access control --------------------------------------------------
      # Comma-separated IPs / CIDRs allowed to reach the site. Empty = open.
      # e.g. ALLOWED_IPS=181.58.39.244
      ALLOWED_IPS: "${ALLOWED_IPS:-}"
      # Trusted reverse-proxy hops (1 = Traefik only; 2 = behind Cloudflare too).
      XFF_TRUSTED_HOPS: "${XFF_TRUSTED_HOPS:-1}"
      # Comma-separated browser origins allowed to call the API cross-origin.
      # Empty = same-origin only in production; localhost origins are reflected in local dev.
      # e.g. CORS_ALLOWED_ORIGINS=https://app.example.com,https://admin.example.com
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      # Expose interactive API docs at /api/docs (off by default for security).
      ENABLE_API_DOCS: "${ENABLE_API_DOCS:-0}"
      # Legacy flag for other third-party plugins (OCR is auto-enabled above).
      MARKITDOWN_PLUGINS: 0
    # Expose the port to Traefik over the docker network. No host "ports:"
    # mapping is needed in Dokploy — Traefik connects internally.
    expose:
      - "8000"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  dokploy-network:
    external: true
